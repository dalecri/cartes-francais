<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Cartes · French Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F6F4EF;
  --card:#FFFFFF;
  --ink:#33303B;
  --ink-soft:#8A8694;
  --ink-faint:#C6C2CE;
  --sage:#7FA98C;
  --sage-soft:#E3EEE6;
  --rose:#C98A90;
  --rose-soft:#F5E5E7;
  --blue:#8FA3C8;
  --blue-soft:#E7ECF5;
  --shadow: 0 1px 2px rgba(51,48,59,.05), 0 8px 24px rgba(51,48,59,.08);
  --shadow-lift: 0 2px 4px rgba(51,48,59,.06), 0 18px 44px rgba(51,48,59,.14);
  --r-lg:24px;
  --r-md:16px;
  --r-sm:12px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Outfit',sans-serif;
  background:var(--paper);
  color:var(--ink);
  overflow:hidden;
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
}
#app{
  height:100dvh;
  max-width:480px;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  padding:max(16px, env(safe-area-inset-top)) 20px max(16px, env(safe-area-inset-bottom));
}

/* ---------- header ---------- */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 2px 16px;
  flex:0 0 auto;
}
.brand{font-family:'Fraunces',serif;font-weight:600;font-size:22px;letter-spacing:-.01em}
.brand em{font-style:italic;color:var(--blue)}
.tabs{display:flex;gap:4px;background:rgba(51,48,59,.06);border-radius:999px;padding:4px}
.tab{
  border:none;background:transparent;font-family:inherit;font-size:13px;font-weight:500;
  color:var(--ink-soft);padding:7px 14px;border-radius:999px;cursor:pointer;
  transition:color .2s, background .2s, box-shadow .2s;
}
.tab.active{background:var(--card);color:var(--ink);box-shadow:0 1px 3px rgba(51,48,59,.12)}
.tab:focus-visible{outline:2px solid var(--blue);outline-offset:2px}

/* ---------- views ---------- */
.view{flex:1;display:none;flex-direction:column;min-height:0;animation:viewIn .32s cubic-bezier(.22,1,.36,1)}
.view.active{display:flex}
@keyframes viewIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ---------- progress ---------- */
.progress{flex:0 0 auto;margin-bottom:14px}
.progress-meta{display:flex;justify-content:space-between;font-size:12px;font-weight:500;color:var(--ink-soft);margin-bottom:8px}
.progress-meta b{color:var(--sage);font-weight:600}
.bar{height:4px;background:rgba(51,48,59,.08);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--blue),var(--sage));border-radius:99px;transition:width .5s cubic-bezier(.22,1,.36,1)}

/* ---------- category pills ---------- */
.cat-pills{
  flex:0 0 auto;display:flex;gap:6px;overflow-x:auto;
  margin:0 -20px 14px;padding:2px 20px 6px;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.cat-pills::-webkit-scrollbar{display:none}
.pill{
  flex:0 0 auto;border:none;cursor:pointer;font-family:inherit;
  font-size:12px;font-weight:500;color:var(--ink-soft);
  background:var(--card);border-radius:99px;padding:7px 13px;
  box-shadow:0 1px 2px rgba(51,48,59,.05);
  transition:background .2s, color .2s, transform .15s;
  white-space:nowrap;
}
.pill:active{transform:scale(.95)}
.pill.active{background:var(--ink);color:var(--paper)}
.pill .n{opacity:.55;font-size:11px;margin-left:4px}

/* category tag on card */
.cat-tag{
  font-size:11px;font-weight:500;color:var(--ink-faint);
  letter-spacing:.06em;text-transform:uppercase;
  position:absolute;top:22px;left:0;right:0;text-align:center;
}

/* list section headers */
.sec-head{
  display:flex;align-items:baseline;justify-content:space-between;
  padding:14px 4px 6px;position:sticky;top:0;background:var(--paper);z-index:2;
}
.sec-head:first-child{padding-top:2px}
.sec-head h4{
  font-family:'Fraunces',serif;font-weight:500;font-style:italic;
  font-size:15px;color:var(--ink);
}
.sec-head span{font-size:11px;color:var(--ink-faint)}

/* ---------- deck ---------- */
.deck{flex:1;position:relative;min-height:0;touch-action:none}
.fcard{
  position:absolute;inset:0;
  border-radius:var(--r-lg);
  background:var(--card);
  box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:center;
  will-change:transform;
  cursor:grab;
  user-select:none;-webkit-user-select:none;
}
.fcard.dragging{cursor:grabbing;box-shadow:var(--shadow-lift)}
.fcard.behind{transform:scale(.94) translateY(14px);opacity:.6;pointer-events:none;transition:transform .35s cubic-bezier(.22,1,.36,1),opacity .35s}
.fcard.behind2{transform:scale(.88) translateY(28px);opacity:.25;pointer-events:none;transition:transform .35s cubic-bezier(.22,1,.36,1),opacity .35s}
.fcard.entering{animation:cardEnter .4s cubic-bezier(.22,1,.36,1)}
@keyframes cardEnter{from{transform:scale(.94) translateY(14px);opacity:.6}to{transform:none;opacity:1}}
.fcard.fly-right{transition:transform .45s cubic-bezier(.3,.7,.4,1),opacity .4s;transform:translate(130vw,-8vh) rotate(24deg)!important;opacity:0}
.fcard.fly-left{transition:transform .45s cubic-bezier(.3,.7,.4,1),opacity .4s;transform:translate(-130vw,-8vh) rotate(-24deg)!important;opacity:0}

.card-inner{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.22,1,.36,1);
}
.fcard.flipped .card-inner{transform:rotateY(180deg)}
.face{
  position:absolute;inset:0;border-radius:var(--r-lg);
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px;text-align:center;gap:14px;
}
.face.back{transform:rotateY(180deg);background:var(--card);border-radius:var(--r-lg)}
.lang-chip{
  font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  padding:5px 12px;border-radius:99px;
}
.face.front .lang-chip{background:var(--blue-soft);color:#5F779F}
.face.back .lang-chip{background:var(--sage-soft);color:#5B8268}
.word{
  font-family:'Fraunces',serif;font-weight:500;
  font-size:clamp(30px,9vw,44px);line-height:1.15;letter-spacing:-.015em;
  overflow-wrap:anywhere;
}
.tap-hint{font-size:12px;color:var(--ink-faint);font-weight:400;position:absolute;bottom:24px}

/* stamps */
.stamp{
  position:absolute;top:26px;
  font-family:'Fraunces',serif;font-style:italic;font-weight:600;font-size:24px;
  padding:6px 16px;border-radius:10px;border:2.5px solid;
  opacity:0;transform:rotate(-12deg) scale(.9);
  transition:opacity .12s;
  pointer-events:none;z-index:5;
}
.stamp.acquis{right:22px;color:var(--sage);border-color:var(--sage);background:var(--sage-soft)}
.stamp.revoir{left:22px;color:var(--rose);border-color:var(--rose);background:var(--rose-soft);transform:rotate(12deg) scale(.9)}

/* ---------- action buttons ---------- */
.actions{flex:0 0 auto;display:flex;justify-content:center;align-items:center;gap:18px;padding:20px 0 4px}
.act{
  border:none;cursor:pointer;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:transform .18s cubic-bezier(.22,1,.36,1), box-shadow .18s;
  box-shadow:var(--shadow);
  background:var(--card);
}
.act:active{transform:scale(.88)}
.act:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
.act.big{width:62px;height:62px}
.act.small{width:46px;height:46px}
.act svg{display:block}
.act-hint{font-size:11px;color:var(--ink-faint);text-align:center;margin-top:10px;flex:0 0 auto}

/* ---------- empty / done states ---------- */
.empty{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;gap:12px;padding:24px;
}
.empty .glyph{font-family:'Fraunces',serif;font-style:italic;font-size:56px;color:var(--ink-faint);line-height:1}
.empty h2{font-family:'Fraunces',serif;font-weight:500;font-size:24px}
.empty p{font-size:14px;color:var(--ink-soft);max-width:260px;line-height:1.5}
.btn{
  font-family:inherit;font-size:14px;font-weight:500;
  border:none;cursor:pointer;border-radius:99px;padding:12px 24px;
  background:var(--ink);color:var(--paper);
  transition:transform .18s, opacity .18s;
  margin-top:6px;
}
.btn:active{transform:scale(.95)}
.btn.ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--ink-faint)}

/* ---------- manage view ---------- */
.add-form{flex:0 0 auto;display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.field-row{display:flex;gap:10px}
.field{flex:1;position:relative}
.field input{
  width:100%;font-family:inherit;font-size:15px;color:var(--ink);
  background:var(--card);border:1px solid transparent;border-radius:var(--r-md);
  padding:14px 16px;box-shadow:0 1px 2px rgba(51,48,59,.05);
  transition:border-color .2s, box-shadow .2s;
}
.field input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-soft)}
.field input::placeholder{color:var(--ink-faint)}
.add-btn{
  font-family:inherit;font-size:14px;font-weight:500;border:none;cursor:pointer;
  background:var(--ink);color:var(--paper);border-radius:var(--r-md);padding:13px;
  transition:transform .15s, opacity .2s;
}
.add-btn:disabled{opacity:.35;cursor:default}
.add-btn:not(:disabled):active{transform:scale(.97)}

.list-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.list-head h3{font-family:'Fraunces',serif;font-weight:500;font-size:17px}
.list-head span{font-size:12px;color:var(--ink-soft)}
.card-list{flex:1;overflow-y:auto;min-height:0;display:flex;flex-direction:column;gap:8px;padding-bottom:8px;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
.row{
  display:flex;align-items:center;gap:12px;
  background:var(--card);border-radius:var(--r-md);padding:13px 14px;
  box-shadow:0 1px 2px rgba(51,48,59,.04);
  animation:rowIn .3s cubic-bezier(.22,1,.36,1);
}
@keyframes rowIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.row.removing{transition:opacity .25s, transform .25s;opacity:0;transform:translateX(24px)}
.row .words{flex:1;min-width:0}
.row .fr{font-family:'Fraunces',serif;font-size:16px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .en{font-size:13px;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
.dot.m{background:var(--sage)}
.dot.l{background:var(--ink-faint)}
.icon-btn{
  border:none;background:transparent;cursor:pointer;padding:8px;border-radius:10px;
  color:var(--ink-faint);transition:color .2s, background .2s;flex:0 0 auto;
}
.icon-btn:hover,.icon-btn:active{color:var(--rose);background:var(--rose-soft)}
.icon-btn.reset:hover,.icon-btn.reset:active{color:var(--blue);background:var(--blue-soft)}

/* toast */
.toast{
  position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));
  transform:translateX(-50%) translateY(12px);
  background:var(--ink);color:var(--paper);font-size:13px;font-weight:500;
  padding:10px 18px;border-radius:99px;opacity:0;pointer-events:none;
  transition:opacity .25s, transform .25s cubic-bezier(.22,1,.36,1);z-index:99;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">Car<em>tes</em></div>
    <nav class="tabs" role="tablist">
      <button class="tab active" id="tabStudy" role="tab">Étudier</button>
      <button class="tab" id="tabManage" role="tab">Cartes</button>
    </nav>
  </header>

  <!-- STUDY VIEW -->
  <section class="view active" id="viewStudy">
    <div class="progress" id="progressWrap">
      <div class="progress-meta">
        <span id="deckCount">0 to review</span>
        <span><b id="masteredCount">0</b> mastered</span>
      </div>
      <div class="bar"><div class="bar-fill" id="barFill"></div></div>
    </div>
    <div class="cat-pills" id="catPills"></div>
    <div class="deck" id="deck"></div>
    <div class="actions" id="actions">
      <button class="act big" id="btnLeft" aria-label="Still learning">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#C98A90" stroke-width="2.2" stroke-linecap="round"><path d="M1 4v6h6"/><path d="M3.5 15a9 9 0 1 0 2-9.7L1 10"/></svg>
      </button>
      <button class="act small" id="btnFlip" aria-label="Flip card">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8FA3C8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg>
      </button>
      <button class="act big" id="btnRight" aria-label="Mastered">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#7FA98C" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
      </button>
    </div>
    <div class="act-hint">swipe right = acquis · swipe left = à revoir · tap card to flip</div>
  </section>

  <!-- MANAGE VIEW -->
  <section class="view" id="viewManage">
    <div class="add-form">
      <div class="field-row">
        <div class="field"><input id="inFr" placeholder="Mot en français" autocomplete="off" autocapitalize="off"></div>
        <div class="field"><input id="inEn" placeholder="English word" autocomplete="off" autocapitalize="off"></div>
      </div>
      <div class="field"><input id="inCat" placeholder="Section (ex. Émotions) · optional" autocomplete="off" list="catOptions"><datalist id="catOptions"></datalist></div>
      <button class="add-btn" id="btnAdd" disabled>Add card</button>
    </div>
    <div class="list-head">
      <h3>Your cards</h3>
      <span id="listCount"></span>
    </div>
    <div class="card-list" id="cardList"></div>
  </section>
</div>
<div class="toast" id="toast"></div>

<script>
(() => {
'use strict';
const KEY = 'cartes-deck-v1';
let state = { cards: [] };
let queue = [];           // ids still to review this session
let flipped = false;
let animating = false;

const seed = [
  // Directions
  {cat:'Directions', fr:'à gauche', en:'to the left'},
  {cat:'Directions', fr:'à droite', en:'to the right'},

  // Émotions
  {cat:'Émotions', fr:'fier / fière', en:'proud'},

const DEFAULT_CAT = 'Divers';

const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36);

/* ---------- storage (persistent, with in-memory fallback) ---------- */
let saveTimer = null;
async function load(){
  try{
    const res = await window.storage.get(KEY);
    if(res && res.value){ state = JSON.parse(res.value); }
  }catch(e){ /* key missing or storage unavailable */ }
  // ensure every card has a category
  state.cards.forEach(c => { if(!c.cat) c.cat = DEFAULT_CAT; });
  // merge in any seed words not already present (dedupe by French word)
  const have = new Set(state.cards.map(c => c.fr.trim().toLowerCase()));
  let added = false;
  seed.forEach(s => {
    if(!have.has(s.fr.trim().toLowerCase())){
      state.cards.push({id:uid(), fr:s.fr, en:s.en, cat:s.cat, mastered:false});
      added = true;
    } else {
      // upgrade existing seed words that were uncategorized
      const ex = state.cards.find(c => c.fr.trim().toLowerCase() === s.fr.trim().toLowerCase());
      if(ex && ex.cat === DEFAULT_CAT){ ex.cat = s.cat; added = true; }
    }
  });
  if(added) persist();
}
function persist(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try{ await window.storage.set(KEY, JSON.stringify(state)); }
    catch(e){ console.warn('save failed', e); }
  }, 250);
}

/* ---------- helpers ---------- */
const $ = id => document.getElementById(id);
const deckEl = $('deck');
function cardById(id){ return state.cards.find(c => c.id === id); }
function learning(){ return state.cards.filter(c => !c.mastered); }
function mastered(){ return state.cards.filter(c => c.mastered); }

function toast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._h);
  t._h = setTimeout(() => t.classList.remove('show'), 1800);
}

/* ---------- categories ---------- */
let activeCat = 'all';
function categories(){
  const set = new Map();
  state.cards.forEach(c => set.set(c.cat, (set.get(c.cat) || 0) + 1));
  return [...set.entries()].sort((a,b) => a[0].localeCompare(b[0], 'fr'));
}
function renderPills(){
  const wrap = $('catPills');
  const cats = categories();
  if(cats.length < 2){ wrap.innerHTML = ''; return; }
  wrap.innerHTML = '';
  const mk = (label, val, count) => {
    const b = document.createElement('button');
    b.className = 'pill' + (activeCat === val ? ' active' : '');
    b.innerHTML = escapeHTML(label) + (count != null ? `<span class="n">${count}</span>` : '');
    b.addEventListener('click', () => {
      activeCat = val;
      rebuildQueue(); renderPills(); renderDeck(true);
    });
    return b;
  };
  wrap.appendChild(mk('Tout', 'all', state.cards.length));
  cats.forEach(([cat, n]) => wrap.appendChild(mk(cat, cat, n)));
  // update datalist for the add form
  const dl = $('catOptions');
  if(dl) dl.innerHTML = cats.map(([c]) => `<option value="${escapeHTML(c)}">`).join('');
}

/* ---------- study deck ---------- */
function rebuildQueue(){
  queue = learning()
    .filter(c => activeCat === 'all' || c.cat === activeCat)
    .map(c => c.id);
  // light shuffle
  for(let i = queue.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [queue[i], queue[j]] = [queue[j], queue[i]];
  }
}

function updateProgress(){
  const m = mastered().length, total = state.cards.length;
  $('deckCount').textContent = queue.length + (queue.length === 1 ? ' to review' : ' to review');
  $('masteredCount').textContent = m;
  $('barFill').style.width = total ? (m / total * 100) + '%' : '0%';
}

function renderDeck(enterAnim){
  deckEl.innerHTML = '';
  flipped = false;
  updateProgress();

  if(state.cards.length === 0){
    deckEl.innerHTML = emptyHTML('☁︎','No cards yet','Add your first French word in the Cartes tab.', 'goManage', 'Add cards');
    hookEmpty(); toggleActions(false); return;
  }
  if(queue.length === 0){
    deckEl.innerHTML = emptyHTML('✿','Tout est acquis !','You\u2019ve mastered every card in the deck. Bravo.', 'restart', 'Review everything again');
    hookEmpty(); toggleActions(false); return;
  }
  toggleActions(true);

  const slice = queue.slice(0, 3);
  // render back-to-front
  for(let i = slice.length - 1; i >= 0; i--){
    const c = cardById(slice[i]);
    if(!c) continue;
    const el = buildCard(c);
    if(i === 1) el.classList.add('behind');
    if(i === 2) el.classList.add('behind2');
    if(i === 0 && enterAnim) el.classList.add('entering');
    deckEl.appendChild(el);
  }
  attachDrag(deckEl.lastElementChild);
}

function emptyHTML(glyph, title, body, action, label){
  return `<div class="empty">
    <div class="glyph">${glyph}</div>
    <h2>${title}</h2><p>${body}</p>
    <button class="btn" data-action="${action}">${label}</button>
  </div>`;
}
function hookEmpty(){
  const b = deckEl.querySelector('[data-action]');
  if(!b) return;
  b.addEventListener('click', () => {
    if(b.dataset.action === 'goManage'){ switchTab('manage'); }
    else {
      state.cards.forEach(c => { if(activeCat === 'all' || c.cat === activeCat) c.mastered = false; });
      persist(); rebuildQueue(); renderPills(); renderDeck(true); renderList();
    }
  });
}
function toggleActions(on){
  $('actions').style.opacity = on ? 1 : .25;
  $('actions').style.pointerEvents = on ? 'auto' : 'none';
}

function buildCard(c){
  const el = document.createElement('div');
  el.className = 'fcard';
  el.dataset.id = c.id;
  el.innerHTML = `
    <div class="stamp acquis">acquis</div>
    <div class="stamp revoir">à revoir</div>
    <div class="card-inner">
      <div class="face front">
        <span class="cat-tag">${escapeHTML(c.cat || DEFAULT_CAT)}</span>
        <span class="lang-chip">Français</span>
        <div class="word">${escapeHTML(c.fr)}</div>
        <span class="tap-hint">tap to reveal</span>
      </div>
      <div class="face back">
        <span class="lang-chip">English</span>
        <div class="word">${escapeHTML(c.en)}</div>
      </div>
    </div>`;
  return el;
}
function escapeHTML(s){ return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

/* ---------- drag / swipe ---------- */
function attachDrag(el){
  if(!el || !el.classList.contains('fcard')) return;
  let startX = 0, startY = 0, dx = 0, dy = 0, dragging = false, moved = false;
  const stampA = el.querySelector('.stamp.acquis');
  const stampR = el.querySelector('.stamp.revoir');

  const down = e => {
    if(animating) return;
    dragging = true; moved = false;
    startX = e.clientX; startY = e.clientY;
    el.classList.add('dragging');
    el.setPointerCapture(e.pointerId);
  };
  const move = e => {
    if(!dragging) return;
    dx = e.clientX - startX; dy = e.clientY - startY;
    if(Math.abs(dx) > 6 || Math.abs(dy) > 6) moved = true;
    const rot = dx * 0.06;
    el.style.transform = `translate(${dx}px, ${dy * 0.4}px) rotate(${rot}deg)`;
    const p = Math.min(Math.abs(dx) / 90, 1);
    if(dx > 0){ stampA.style.opacity = p; stampR.style.opacity = 0; }
    else { stampR.style.opacity = p; stampA.style.opacity = 0; }
  };
  const up = () => {
    if(!dragging) return;
    dragging = false;
    el.classList.remove('dragging');
    const threshold = Math.min(deckEl.offsetWidth * 0.32, 130);
    if(dx > threshold){ fly(el, 'right'); }
    else if(dx < -threshold){ fly(el, 'left'); }
    else{
      el.style.transition = 'transform .35s cubic-bezier(.22,1,.36,1)';
      el.style.transform = '';
      stampA.style.opacity = 0; stampR.style.opacity = 0;
      setTimeout(() => el.style.transition = '', 360);
      if(!moved) flipCard(el);
    }
    dx = 0; dy = 0;
  };
  el.addEventListener('pointerdown', down);
  el.addEventListener('pointermove', move);
  el.addEventListener('pointerup', up);
  el.addEventListener('pointercancel', up);
}

function flipCard(el){
  el = el || deckEl.lastElementChild;
  if(!el || !el.classList.contains('fcard')) return;
  flipped = !flipped;
  el.classList.toggle('flipped', flipped);
}

function fly(el, dir){
  if(animating) return;
  animating = true;
  el.querySelector('.stamp.' + (dir === 'right' ? 'acquis' : 'revoir')).style.opacity = 1;
  el.classList.add(dir === 'right' ? 'fly-right' : 'fly-left');
  const id = el.dataset.id;
  if(dir === 'right'){
    const c = cardById(id);
    if(c){ c.mastered = true; persist(); }
    queue = queue.filter(q => q !== id);
  } else {
    // send to back of queue
    queue = queue.filter(q => q !== id);
    queue.push(id);
  }
  setTimeout(() => {
    animating = false;
    renderDeck(true);
    renderList();
  }, 320);
}

/* button swipes */
function buttonSwipe(dir){
  const el = deckEl.lastElementChild;
  if(!el || !el.classList.contains('fcard') || animating) return;
  el.style.transform = `translate(${dir === 'right' ? 40 : -40}px, -6px) rotate(${dir === 'right' ? 4 : -4}deg)`;
  requestAnimationFrame(() => fly(el, dir));
}
$('btnRight').addEventListener('click', () => buttonSwipe('right'));
$('btnLeft').addEventListener('click', () => buttonSwipe('left'));
$('btnFlip').addEventListener('click', () => flipCard());

/* keyboard */
document.addEventListener('keydown', e => {
  if($('viewStudy').classList.contains('active')){
    if(e.key === 'ArrowRight') buttonSwipe('right');
    if(e.key === 'ArrowLeft') buttonSwipe('left');
    if(e.key === ' ' && document.activeElement.tagName !== 'INPUT'){ e.preventDefault(); flipCard(); }
  }
});

/* ---------- manage view ---------- */
const inFr = $('inFr'), inEn = $('inEn'), inCat = $('inCat'), btnAdd = $('btnAdd');
function validate(){ btnAdd.disabled = !(inFr.value.trim() && inEn.value.trim()); }
inFr.addEventListener('input', validate);
inEn.addEventListener('input', validate);
[inFr, inEn, inCat].forEach(i => i.addEventListener('keydown', e => { if(e.key === 'Enter' && !btnAdd.disabled) addCard(); }));
btnAdd.addEventListener('click', addCard);

function addCard(){
  const cat = inCat.value.trim() || DEFAULT_CAT;
  const c = { id: uid(), fr: inFr.value.trim(), en: inEn.value.trim(), cat, mastered: false };
  state.cards.unshift(c);
  if(activeCat === 'all' || activeCat === cat) queue.unshift(c.id);
  persist();
  inFr.value = ''; inEn.value = ''; validate(); inFr.focus();
  renderPills(); renderList(); updateProgress();
  if(deckEl.querySelector('.empty')) renderDeck(true);
  toast('Card added');
}

function renderList(){
  const list = $('cardList');
  $('listCount').textContent = state.cards.length + ' cards · ' + mastered().length + ' mastered';
  if(state.cards.length === 0){
    list.innerHTML = '<div class="empty" style="padding:40px 20px"><div class="glyph">✎</div><p>No cards yet. Add one above to start building your deck.</p></div>';
    return;
  }
  list.innerHTML = '';
  // group cards by category
  const groups = new Map();
  state.cards.forEach(c => {
    const k = c.cat || DEFAULT_CAT;
    if(!groups.has(k)) groups.set(k, []);
    groups.get(k).push(c);
  });
  const sorted = [...groups.entries()].sort((a,b) => a[0].localeCompare(b[0], 'fr'));
  sorted.forEach(([cat, cards]) => {
    const head = document.createElement('div');
    head.className = 'sec-head';
    const m = cards.filter(c => c.mastered).length;
    head.innerHTML = `<h4>${escapeHTML(cat)}</h4><span>${m}/${cards.length} acquis</span>`;
    list.appendChild(head);
    cards.forEach(c => list.appendChild(buildRow(c)));
  });
}

function buildRow(c){
    const row = document.createElement('div');
    row.className = 'row';
    row.innerHTML = `
      <span class="dot ${c.mastered ? 'm' : 'l'}" title="${c.mastered ? 'Mastered' : 'Learning'}"></span>
      <div class="words"><div class="fr">${escapeHTML(c.fr)}</div><div class="en">${escapeHTML(c.en)}</div></div>
      ${c.mastered ? `<button class="icon-btn reset" aria-label="Move back to learning" title="Review again">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 4v6h6"/><path d="M3.5 15a9 9 0 1 0 2-9.7L1 10"/></svg>
      </button>` : ''}
      <button class="icon-btn del" aria-label="Delete card">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
      </button>`;
    row.querySelector('.del').addEventListener('click', () => {
      row.classList.add('removing');
      setTimeout(() => {
        state.cards = state.cards.filter(x => x.id !== c.id);
        queue = queue.filter(q => q !== c.id);
        if(activeCat !== 'all' && !state.cards.some(x => x.cat === activeCat)) activeCat = 'all';
        persist(); renderPills(); renderList(); renderDeck(false);
      }, 240);
    });
    const rst = row.querySelector('.reset');
    if(rst) rst.addEventListener('click', () => {
      c.mastered = false;
      if(activeCat === 'all' || c.cat === activeCat) queue.push(c.id);
      persist(); renderPills(); renderList(); renderDeck(false);
      toast('Back in the deck');
    });
    return row;
}

/* ---------- tabs ---------- */
function switchTab(which){
  const study = which === 'study';
  $('tabStudy').classList.toggle('active', study);
  $('tabManage').classList.toggle('active', !study);
  $('viewStudy').classList.toggle('active', study);
  $('viewManage').classList.toggle('active', !study);
}
$('tabStudy').addEventListener('click', () => switchTab('study'));
$('tabManage').addEventListener('click', () => switchTab('manage'));

/* ---------- init ---------- */
load().then(() => {
  rebuildQueue();
  renderPills();
  renderDeck(true);
  renderList();
});
})();
</script>
</body>
</html>
