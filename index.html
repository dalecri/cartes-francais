<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Cartes · Minimalist French Flashcards</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            serif: ['Fraunces', 'serif'],
          },
          screens: {
            'xs': '380px',
          }
        }
      }
    }
  </script>

  <style>
    :root {
      /* Warm Linen / Cream Background */
      --app-bg: #F2ECE4;
      --paper: #FAF8F4;
      --ink: #2C2830;
      --ink-soft: #635E6A;
      --ink-faint: #BAB4C1;
      
      /* Pure themed card backgrounds */
      --theme-blue-bg: #4C599E;
      --theme-blue-blob: rgba(255, 255, 255, 0.18);
      
      --theme-orange-bg: #F3D086;
      --theme-orange-blob: rgba(255, 255, 255, 0.22);
      
      --theme-sage-bg: #87A691;
      --theme-sage-blob: rgba(255, 255, 255, 0.2);
      
      --theme-rose-bg: #D48A93;
      --theme-rose-blob: rgba(255, 255, 255, 0.22);

      --shadow-sm: 0 4px 12px rgba(44, 40, 48, 0.05);
      --shadow-md: 0 12px 36px rgba(44, 40, 48, 0.12);
    }

    body {
      background-color: var(--app-bg);
      color: var(--ink);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.3s ease;
    }

    /* Prevent text selection during swipe gestures */
    .fcard {
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      perspective: 1500px;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .fcard.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .face {
      position: absolute;
      inset: 0;
      border-radius: 32px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }

    /* Completely opaque card faces to prevent overlap peeking */
    .face.front {
      background-color: var(--paper);
      transform: rotateY(0deg);
      border: 8px solid #FFFFFF;
      z-index: 2;
    }

    .face.back {
      transform: rotateY(180deg);
      z-index: 1;
    }

    /* Wavy grid vectors replicating natural lines - darkened & thickened for mobile visibility */
    .grid-blue {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='36' height='36'><path d='M 0 10 Q 9 8 18 10 T 36 10' fill='none' stroke='%23C1D5E8' stroke-width='1.8'/><path d='M 10 0 Q 8 9 10 18 T 10 36' fill='none' stroke='%23C1D5E8' stroke-width='1.8'/></svg>");
    }
    .grid-orange {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='36' height='36'><path d='M 0 10 Q 9 11 18 10 T 36 10' fill='none' stroke='%23FADAA2' stroke-width='1.8'/><path d='M 10 0 Q 11 9 10 18 T 10 36' fill='none' stroke='%23FADAA2' stroke-width='1.8'/></svg>");
    }
    .grid-sage {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='36' height='36'><path d='M 0 10 Q 9 9 18 10 T 36 10' fill='none' stroke='%23C9DBCF' stroke-width='1.8'/><path d='M 10 0 Q 9 9 10 18 T 10 36' fill='none' stroke='%23C9DBCF' stroke-width='1.8'/></svg>");
    }
    .grid-rose {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='36' height='36'><path d='M 0 10 Q 9 8 18 10 T 36 10' fill='none' stroke='%23F0CCD1' stroke-width='1.8'/><path d='M 10 0 Q 8 9 10 18 T 10 36' fill='none' stroke='%23F0CCD1' stroke-width='1.8'/></svg>");
    }

    /* Guarantees a perfect circle regardless of card proportions using aspect-ratio */
    .spotlight {
      width: 86%;
      aspect-ratio: 1 / 1;
      background: var(--paper);
      border-radius: 50%;
      border: none;
      box-shadow: inset 0 2px 8px rgba(44, 40, 48, 0.02), var(--shadow-sm);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 16px;
      position: relative;
    }

    /* Straightened painted tape banner style for French words */
    .word-banner {
      padding: 8px 24px;
      border-radius: 12px;
      color: #FFFFFF;
      font-weight: 600;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      transform: none;
      max-width: 92%;
      word-wrap: break-word;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    /* Theme card back colors */
    .theme-blue { background-color: var(--theme-blue-bg); }
    .theme-orange { background-color: var(--theme-orange-bg); }
    .theme-sage { background-color: var(--theme-sage-bg); }
    .theme-rose { background-color: var(--theme-rose-bg); }

    /* Animated, morphing organic shapes on the backside */
    .geo-shape {
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      position: relative;
      animation: morphingBlob 10s ease-in-out infinite alternate;
    }

    .geo-shape.shape-1 {
      border-radius: 54% 46% 62% 38% / 44% 56% 44% 56%;
      background: var(--theme-blue-blob);
    }
    .geo-shape.shape-2 {
      border-radius: 38% 62% 42% 58% / 52% 38% 62% 48%;
      background: var(--theme-orange-blob);
    }
    .geo-shape.shape-3 {
      border-radius: 48% 52% 32% 68% / 42% 68% 32% 58%;
      background: var(--theme-sage-blob);
    }
    .geo-shape.shape-4 {
      border-radius: 62% 38% 48% 52% / 58% 32% 68% 42%;
      background: var(--theme-rose-blob);
    }

    @keyframes morphingBlob {
      0% { transform: scale(1) rotate(0deg); }
      100% { transform: scale(1.06) rotate(12deg); }
    }

    .fcard.behind {
      transform: scale(0.95) translateY(14px) rotate(-1deg);
      opacity: 0.8;
      pointer-events: none;
      z-index: 10;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s;
    }

    .fcard.behind2 {
      transform: scale(0.9) translateY(28px) rotate(1deg);
      opacity: 0.4;
      pointer-events: none;
      z-index: 5;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s;
    }

    .fcard.entering {
      animation: cardEnter 0.45s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes cardEnter {
      from { transform: scale(0.92) translateY(20px); opacity: 0; }
      to { transform: none; opacity: 1; }
    }

    /* Opacity guard to prevent lower card content from bleeding through */
    .fcard.behind .spotlight,
    .fcard.behind .geo-shape,
    .fcard.behind2 .spotlight,
    .fcard.behind2 .geo-shape {
      opacity: 0 !important;
      transition: opacity 0.2s ease;
    }

    .fcard:not(.behind):not(.behind2) .spotlight,
    .fcard:not(.behind):not(.behind2) .geo-shape {
      opacity: 1 !important;
      transition: opacity 0.25s ease;
    }

    /* Hide Illustrative examples when minimal toggle is active */
    .hide-examples .illustration-text {
      display: none !important;
    }
    
    .hide-examples .spotlight {
      gap: 0px !important;
    }

    /* Minimalist swipe feedback badges */
    .stamp {
      position: absolute;
      top: 24px;
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 99px;
      opacity: 0;
      pointer-events: none;
      z-index: 30;
      transition: opacity 0.1s ease;
    }
    .stamp.acquis {
      right: 24px;
      color: #1E4620;
      background-color: #E2F3E5;
      transform: none;
    }
    .stamp.revoir {
      left: 24px;
      color: #611D24;
      background-color: #FCE8E9;
      transform: none;
    }

    /* ---------- Premium Tactile Minimalist Buttons ---------- */
    .tactile-btn {
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 10px rgba(44, 40, 48, 0.04), 0 2px 4px rgba(44, 40, 48, 0.02);
      background-color: #FFFFFF;
    }

    .tactile-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(44, 40, 48, 0.07);
    }

    .tactile-btn:active {
      transform: translateY(1px);
      box-shadow: 0 2px 6px rgba(44, 40, 48, 0.03);
    }

    .btn-revoir {
      background-color: #FDF4F5;
      color: #D48A93;
      border: 1.5px solid rgba(212, 138, 147, 0.18);
    }
    .btn-revoir:hover {
      background-color: #FCE8E9;
    }

    .btn-flip {
      background-color: #FFFFFF;
      color: #635E6A;
      border: 1.5px solid rgba(99, 94, 106, 0.12);
    }
    .btn-flip:hover {
      background-color: #FAF8F4;
    }

    .btn-acquis {
      background-color: #F1F7F3;
      color: #87A691;
      border: 1.5px solid rgba(135, 166, 145, 0.18);
    }
    .btn-acquis:hover {
      background-color: #E2F3E5;
    }
  </style>
</head>

<body class="h-dvh w-screen flex flex-col items-center justify-between p-4 md:p-6 pb-28 md:pb-6 select-none overflow-hidden relative">

  <!-- Header Section: Centered title on mobile, aligned on desktop -->
  <header class="w-full max-w-[380px] md:max-w-[850px] flex items-center justify-center md:justify-between py-3 md:py-2 z-20 shrink-0">
    <div class="brand font-serif font-semibold text-2xl text-slate-800 tracking-tight flex items-center gap-1.5 select-none text-center">
      Car<em>tes</em>
      <span class="w-1.5 h-1.5 rounded-full bg-[#E38379]"></span>
    </div>
  </header>

  <!-- Main View Area: Expands dynamically on mobile to show larger card stack -->
  <main class="w-full max-w-[380px] md:max-w-[850px] flex-grow flex flex-col justify-center overflow-visible py-2">
    
    <!-- STUDY VIEW: Action buttons hidden entirely on mobile for a distraction-free swipe experience -->
    <section id="viewStudy" class="w-full h-full flex flex-col justify-between overflow-visible">
      
      <!-- Minimalist Progress Stats -->
      <div class="w-full flex justify-between items-center px-4 shrink-0 mb-3 md:mb-4 text-slate-500 text-xs font-semibold relative">
        <span id="deckCount" class="w-1/2 text-left text-[11px] md:text-xs">0 restants</span>
        <span id="masteredCount" class="w-1/2 text-right text-[11px] md:text-xs">0 acquis</span>
      </div>

      <!-- Main Deck Canvas Area: Capped on desktop, expanded on mobile to look bold and beautiful -->
      <div class="relative w-full max-w-[300px] xs:max-w-[330px] md:max-w-[330px] aspect-[3/4] h-[60vh] xs:h-[62vh] md:max-h-[520px] flex-grow mx-auto my-1 md:my-3 overflow-visible flex items-center justify-center">
        <div id="deck" class="relative w-full h-full overflow-visible">
          <!-- Dynamic card injections -->
        </div>
      </div>

      <!-- Desktop-only controls block: Hidden on mobile to let the cards take center stage -->
      <div class="shrink-0 hidden md:flex flex-col items-center gap-2 md:gap-3 mt-4">
        <div id="actions" class="flex justify-center items-center gap-5 md:gap-6">
          <button id="btnLeft" aria-label="À revoir" class="tactile-btn btn-revoir w-[52px] h-[52px]">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <path d="M1 4v6h6" />
              <path d="M3.5 15a9 9 0 1 0 2-9.7L1 10" />
            </svg>
          </button>
          
          <button id="btnFlip" aria-label="Retourner la carte" class="tactile-btn btn-flip w-[42px] h-[42px]">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 2l4 4-4 4" />
              <path d="M3 11v-1a4 4 0 0 1 4-4h14" />
              <path d="M7 22l-4-4 4-4" />
              <path d="M21 13v1a4 4 0 0 1-4 4H3" />
            </svg>
          </button>
          
          <button id="btnRight" aria-label="Acquis" class="tactile-btn btn-acquis w-[52px] h-[52px]">

              <path d="M20 6L9 17l-5-5" />
            </svg>
          </button>
        </div>
        <span class="text-slate-400 text-[10px] uppercase tracking-wider font-semibold text-center select-none">
          Glisser pour trier · Clic pour retourner
        </span>
      </div>
    </section>

    <!-- CARD CREATOR VIEW: Beautiful paper form perfectly proportioned and centered on the screen -->
    <section id="viewManage" class="hidden w-full h-full flex-col justify-center items-center overflow-visible">
      <div class="bg-white rounded-[32px] p-5 md:p-6 shadow-md w-full max-w-[320px] md:max-w-[360px] mx-auto">
        <h3 class="font-serif font-semibold text-base md:text-lg text-slate-800 mb-3 md:mb-4 text-center">Nouvelle carte</h3>
        
        <div class="grid grid-cols-2 gap-3 mb-3">
          <div>
            <label class="text-[9px] uppercase font-bold tracking-wider text-slate-400 block mb-1">Français</label>
            <input id="inFr" placeholder="ex: Fier" class="w-full text-xs md:text-sm rounded-xl px-3 py-2 bg-slate-100 border-0 focus:ring-2 focus:ring-[#4C599E] outline-none text-slate-800" autocomplete="off">
          </div>
          <div>
            <label class="text-[9px] uppercase font-bold tracking-wider text-slate-400 block mb-1">English</label>
            <input id="inEn" placeholder="ex: Proud" class="w-full text-xs md:text-sm rounded-xl px-3 py-2 bg-slate-100 border-0 focus:ring-2 focus:ring-[#4C599E] outline-none text-slate-800" autocomplete="off">
          </div>
        </div>

        <div class="mb-4 md:mb-5">
          <label class="text-[9px] uppercase font-bold tracking-wider text-slate-400 block mb-1">Explication ou Exemple (optionnel)</label>
          <textarea id="inDesc" placeholder="ex: Quand ton cœur bat tout fort et grandit..." class="w-full text-xs md:text-sm rounded-xl px-3 py-2 bg-slate-100 border-0 focus:ring-2 focus:ring-[#4C599E] outline-none text-slate-800 h-[64px] md:h-[68px] resize-none"></textarea>
        </div>

        <button id="btnAdd" disabled class="w-full py-2.5 bg-[#2C2830] text-white text-xs font-semibold rounded-xl hover:bg-slate-800 active:scale-95 transition-all disabled:opacity-35 disabled:cursor-not-allowed">
          Ajouter au jeu
        </button>
      </div>
    </section>

  </main>

  <!-- Sizable Integrated Navigation Bar at bottom on mobile, repositioning cleanly on desktop header -->
  <nav class="tabs fixed bottom-6 left-1/2 -translate-x-1/2 md:absolute md:top-6 md:bottom-auto md:right-6 md:left-auto md:translate-x-0 flex items-center bg-white md:bg-slate-200/50 p-1 md:p-1 rounded-full border border-slate-300/40 backdrop-blur-md shadow-lg md:shadow-none z-30 shrink-0 gap-1 md:gap-1">
    <button id="tabStudy" class="px-5 md:px-5 py-2 md:py-1.5 text-xs md:text-xs font-semibold rounded-full transition-all text-slate-600 active bg-slate-800 text-white md:bg-white md:!text-slate-800 shadow-sm">Étudier</button>
    <button id="tabManage" class="px-5 md:px-5 py-2 md:py-1.5 text-xs md:text-xs font-semibold rounded-full transition-all text-slate-500">Ajouter</button>
    <div id="navDivider" class="h-4 w-[1px] bg-slate-300/60 mx-1"></div>
    <button id="btnToggleExamples" aria-label="Masquer les exemples" class="w-8 h-8 rounded-full flex items-center justify-center text-slate-500 transition-all hover:bg-slate-100 hover:text-slate-800 active:scale-95">
      <svg id="eyeIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>
    </button>
  </nav>

  <!-- Minimal Notifications Toast -->
  <div id="toast" class="toast"></div>

        'bien que': "Une jolie pirouette pour dire que quelque chose se produit malgré un obstacle.",
        'pourtant': "Un petit mot étonné qui montre que les choses ne se passent pas comme prévu.",
        'd’ailleurs': "Ajouter un petit mot de plus au bord de la conversation pour l'enrichir.",
        'en revanche': "Faire pencher la balance de l'autre côté avec un argument tout neuf.",
        'quant à': "Pointer doucement du doigt un sujet particulier pour s'en occuper à son tour.",
        'afin de': "La direction que prend une action pour réussir à atteindre son petit rêve.",
        'à condition que': "Une petite règle du jeu à accepter pour pouvoir s'amuser tous ensemble.",
        'dès que': "Au moment précis, sans perdre une seule seconde, comme un signal de départ.",
        'tandis que': "Pendant que tu dessines un oiseau, ton ami peint un grand soleil doré.",
        'malgré': "Avancer courageusement sous la pluie sans perdre son sourire.",
        'dorénavant': "À partir de maintenant, on fera les choses avec un regard tout nouveau.",
        'parfois': "Pas tous les jours, juste quand une petite fée décide de passer.",
        'souvent': "De nombreuses fois, presque comme une habititude qu'on adore répéter.",
        'rarement': "Aussi exceptionnel que de croiser un trèfle à quatre feuilles dans le jardin.",
        'tout à l’heure': "Dans un petit moment, juste après avoir fini de ranger nos crayons.",
        'la veille': "Le jour juste avant, celui qui s'est endormi pour laisser place à aujourd'hui.",
        'le lendemain': "Le jour qui attend sagement que la nuit se termine pour s'éveiller.",
        'auparavant': "Il y a bien longtemps, avant que l'histoire ne commence.",
        'désormais': "Le point de départ d'une toute nouvelle habitude à garder dans le cœur.",
        'tous les deux jours': "Sauter un dodo sur deux pour faire une jolie routine régulière.",
        'de temps en temps': "Quand l'envie nous prend, comme une surprise au milieu de la semaine.",
        'le rez-de-chaussée': "La partie de la maison qui touche la terre et où les pas résonnent directement.",
        'l’étage': "La jolie grimpette par l'escalier de bois pour se rapprocher doucement des nuages.",
        'le grenier': "Le nid secret sous le toit où dorment les vieux jouets et les souvenirs oubliés.",
        'le sous-sol': "Sous les pieds, là où dorment les outils et les réserves de confitures.",
        'la cour': "Un petit carré de liberté dehors pour courir sous le grand soleil.",
        'le quai': "Un pont de planches au bord de l'eau pour saluer les bateaux qui partent en voyage.",
        'la rivière': "Un long ruban bleu qui coule et chante au milieu des arbres.",
        'le chauffage': "La douce chaleur invisible qui enveloppe la maison quand l'hiver est là.",
        'la poussière': "Des petits grains gris volants qui aiment se poser sur les meubles pour faire des dessins.",
        'l’aspirateur': "Le petit monstre bruyant qui avale toute la poussière de la maison.",
        'déménager': "Ranger sa vie dans des cartons pour aller s'installer dans une nouvelle aventure.",
        'emménager': "Déballer ses peluches et ses secrets dans sa nouvelle chambre toute neuve.",
        'atteindre': "Tendre le bras très fort pour décrocher la plus haute pomme de l'arbre.",
        'craindre': "Ce frisson qui arrive quand l'orage gronde ou que l'ombre est un peu trop grande.",
        'résoudre': "Trouver la clé d'une énigme compliquée pour voir le sourire revenir.",
        'se plaindre': "Laisser parler sa peine en chuchotant de petits mots tristes.",
        'convaincre': "Partager ses arguments avec tant de passion que l'autre finit par dire oui.",
        's’apercevoir de': "Remarquer soudain une petite coccinelle posée sur sa manche.",
        'se débrouiller': "Trouver une idée astucieuse tout seul comme un grand.",
        'avoir beau + inf.': "Essayer encore et encore sans réussir, mais avec beaucoup de courage.",
        'valoir la peine': "Un effort qui coûte un peu mais qui apporte tellement de bonheur à la fin.",
        'il s’agit de': "Le but secret du jeu, ce qu'on doit découvrir ensemble."
      };

      const seed = [
        { fr: 'à gauche', en: 'to the left' },
        { fr: 'à droite', en: 'to the right' },
        { fr: 'tout droit', en: 'straight ahead' },
        { fr: 'en face de', en: 'across from' },
        { fr: 'à côté de', en: 'next to' },
        { fr: 'au coin de', en: 'at the corner of' },
        { fr: 'au bout de', en: 'at the end of' },
        { fr: 'vers', en: 'towards' },
        { fr: 'au-dessus de', en: 'above' },
        { fr: 'au-dessous de', en: 'below' },
        { fr: 'traverser', en: 'to cross' },
        { fr: 'faire demi-tour', en: 'to turn around' },
        { fr: 'fier / fière', en: 'proud' },
        { fr: 'déçu(e)', en: 'disappointed' },
        { fr: 'inquiet / inquiète', en: 'worried' },
        { fr: 'soulagé(e)', en: 'relieved' },
        { fr: 'gêné(e)', en: 'embarrassed' },
        { fr: 'épuisé(e)', en: 'exhausted' },
        { fr: 'agacé(e)', en: 'annoyed' },
        { fr: 'ravi(e)', en: 'delighted' },
        { fr: 'bouleversé(e)', en: 'deeply upset' },
        { fr: 'méfiant(e)', en: 'suspicious' },
        { fr: 'avoir hâte de', en: 'to look forward to' },
        { fr: 'en avoir marre de', en: 'to be fed up with' }
      ];

      const THEMES = ['blue', 'orange', 'sage', 'rose'];
      const SHAPES = ['shape-1', 'shape-2', 'shape-3', 'shape-4'];

      const memoryStorage = {
        _data: {},
        get: function(k) { return Promise.resolve({ value: this._data[k] || null }); },
        set: function(k, v) { this._data[k] = v; return Promise.resolve(); }
      };
      const getStorage = () => window.storage || memoryStorage;

      async function load() {
        try {
          const res = await getStorage().get(KEY);
          if (res && res.value) {
            state = JSON.parse(res.value);
          }
        } catch (e) {
          console.warn('Fallback storage active');
        }

        state.cards.forEach(c => {
          if (!c.desc) c.desc = cuteExplorations[c.fr] || DEFAULT_DESC;
        });

        const have = new Set(state.cards.map(c => c.fr.trim().toLowerCase()));
        let added = false;
        seed.forEach(s => {
          if (!have.has(s.fr.trim().toLowerCase())) {
            state.cards.push({
              id: uid(),
              fr: s.fr,
              en: s.en,
              desc: cuteExplorations[s.fr] || DEFAULT_DESC,
              mastered: false
            });
            added = true;
          }
        });
        if (added) persist();
      }

      let saveTimer = null;
      function persist() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(async () => {
          try {
            await getStorage().set(KEY, JSON.stringify(state));
          } catch (e) {
            console.warn('Persistence save error', e);
          }
        }, 250);
      }

      const $ = id => document.getElementById(id);
      const deckEl = $('deck');

      function cardById(id) {
        return state.cards.find(c => c.id === id);
      }

      function learning() {
        return state.cards.filter(c => !c.mastered);
      }

      function mastered() {
        return state.cards.filter(c => c.mastered);
      }

      function toast(msg) {
        const t = $('toast');
        t.textContent = msg;
        t.className = "toast fixed left-1/2 -translate-x-1/2 bottom-24 bg-[#2C2830] text-white text-xs font-semibold px-6 py-3 rounded-full shadow-lg z-[9999] transition-all transform translate-y-0 opacity-100";
        clearTimeout(t._h);
        t._h = setTimeout(() => {
          t.className = "toast fixed left-1/2 -translate-x-1/2 bottom-24 bg-[#2C2830] text-white text-xs font-semibold px-6 py-3 rounded-full shadow-lg z-[9999] transition-all transform translate-y-4 opacity-0 pointer-events-none";
        }, 1800);
      }

      function rebuildQueue() {
        queue = learning().map(c => c.id);
        for (let i = queue.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [queue[i], queue[j]] = [queue[j], queue[i]];
        }
      }

      function updateProgress() {
        const m = mastered().length;
        $('deckCount').textContent = queue.length + (queue.length === 1 ? ' restant' : ' restants');
        $('masteredCount').textContent = `${m} acquis`;
      }

      function getCardVisuals(id) {
        let code = 0;
        for (let i = 0; i < id.length; i++) {
          code += id.charCodeAt(i);
        }
        return {
          theme: THEMES[code % THEMES.length],
          shape: SHAPES[(code + 2) % SHAPES.length]
        };
      }

      function renderDeck(initial) {
        flipped = false;
        updateProgress();

        if (state.cards.length === 0) {
          deckEl.innerHTML = emptyHTML('☁︎', 'Aucune carte', 'Commencez à bâtir votre vocabulaire en ajoutant une carte.', 'goManage', 'Ajouter des cartes');
          hookEmpty();
          toggleActions(false);
          return;
        }

        if (queue.length === 0) {
          deckEl.innerHTML = emptyHTML('✿', 'Tout est acquis !', 'Vous avez maîtrisé toutes vos cartes.', 'restart', 'Réviser à nouveau');
          hookEmpty();
          toggleActions(false);
          return;
        }

        toggleActions(true);

        if (initial) {
          deckEl.innerHTML = '';
          const slice = queue.slice(0, 3);
          for (let i = slice.length - 1; i >= 0; i--) {
            const c = cardById(slice[i]);
            if (!c) continue;
            const el = buildCard(c);
            if (i === 1) el.className = 'fcard absolute inset-0 rounded-[32px] behind';
            if (i === 2) el.className = 'fcard absolute inset-0 rounded-[32px] behind2';
            if (i === 0) el.className = 'fcard absolute inset-0 rounded-[32px] z-20 entering';
            deckEl.appendChild(el);
          }
          attachDrag(deckEl.lastElementChild);
        }
      }

      function emptyHTML(glyph, title, body, action, label) {
        return `<div class="empty flex flex-col items-center justify-center text-center p-6 bg-white rounded-[32px] shadow-lg w-full h-full">
          <div class="glyph text-5xl text-[#E38379] mb-4">${glyph}</div>
          <h2 class="font-serif font-semibold text-xl text-slate-800 mb-2">${title}</h2>
          <p class="text-xs text-slate-500 max-w-[220px] mb-6 leading-relaxed">${body}</p>
          <button class="btn bg-[#2C2830] text-white text-xs font-semibold px-6 py-3 rounded-full hover:scale-105 transition-all" data-action="${action}">${label}</button>
        </div>`;
      }

      function hookEmpty() {
        const b = deckEl.querySelector('[data-action]');
        if (!b) return;
        b.addEventListener('click', () => {
          if (b.dataset.action === 'goManage') {
            switchTab('manage');
          } else {
            state.cards.forEach(c => {
              c.mastered = false;
            });
            persist();
            rebuildQueue();
            renderDeck(true);
          }
        });
      }

      function toggleActions(on) {
        const el = $('actions');
        if (el) {
          el.style.opacity = on ? '1' : '0.25';
          el.style.pointerEvents = on ? 'auto' : 'none';
        }
      }

      function buildCard(c) {
        const el = document.createElement('div');
        el.dataset.id = c.id;

        const visuals = getCardVisuals(c.id);

        el.innerHTML = `
          <div class="stamp acquis">acquis</div>
          <div class="stamp revoir">à revoir</div>
          <div class="card-inner">
            <div class="face front grid-${visuals.theme}">
              <div class="spotlight">
                <div class="word-banner theme-${visuals.theme}">
                  <span class="font-serif text-lg md:text-xl font-semibold">${escapeHTML(c.fr)}</span>
                </div>
                <div class="illustration-text text-slate-600 font-sans text-xs px-2 leading-relaxed text-center max-w-[210px] mx-auto">
                  ${escapeHTML(c.desc || DEFAULT_DESC)}
                </div>
              </div>
            </div>
            
            <div class="face back theme-${visuals.theme}">
              <div class="geo-shape ${visuals.shape}">
                <div class="translation font-serif font-bold text-xl md:text-2xl text-white text-center leading-tight">
                  ${escapeHTML(c.en)}
                </div>
              </div>
            </div>
          </div>`;
        return el;
      }

      function escapeHTML(s) {
        return s.replace(/[&<>"']/g, m => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        }[m]));
      }

      function attachDrag(el) {
        if (!el) return;
        let startX = 0, startY = 0, dx = 0, dy = 0;
        let dragging = false, moved = false;

        const stampA = el.querySelector('.stamp.acquis');
        const stampR = el.querySelector('.stamp.revoir');

        const down = e => {
          if (animating) return;
          dragging = true;
          moved = false;
          startX = e.clientX;
          startY = e.clientY;
          el.setPointerCapture(e.pointerId);
          el.style.transition = 'none';
        };

        const move = e => {
          if (!dragging) return;
          dx = e.clientX - startX;
          dy = e.clientY - startY;

          if (Math.abs(dx) > 6 || Math.abs(dy) > 6) moved = true;

          const rot = dx * 0.05;
          el.style.transform = `translate(${dx}px, ${dy * 0.3}px) rotate(${rot}deg)`;
          
          const progress = Math.min(Math.abs(dx) / 100, 1);
          if (dx > 0) {
            stampA.style.opacity = progress;
            stampR.style.opacity = 0;
          } else {
            stampR.style.opacity = progress;
            stampA.style.opacity = 0;
          }
        };

        const up = () => {
          if (!dragging) return;
          dragging = false;

          const threshold = Math.min(deckEl.offsetWidth * 0.32, 110);
          if (dx > threshold) {
            fly(el, 'right');
          } else if (dx < -threshold) {
            fly(el, 'left');
          } else {
            el.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2)';
            el.style.transform = '';
            stampA.style.opacity = 0;
            stampR.style.opacity = 0;
            if (!moved) flipCard(el);
          }
          dx = 0; dy = 0;
        };

        el.addEventListener('pointerdown', down);
        el.addEventListener('pointermove', move);
        el.addEventListener('pointerup', up);
        el.addEventListener('pointercancel', up);
      }

      function flipCard(el) {
        el = el || deckEl.lastElementChild;
        if (!el) return;
        flipped = !flipped;
        el.classList.toggle('flipped', flipped);
      }

      function fly(el, dir) {
        if (animating) return;
        animating = true;

        el.querySelector('.stamp.' + (dir === 'right' ? 'acquis' : 'revoir')).style.opacity = 1;
        el.style.transition = 'transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.25s';
        
        if (dir === 'right') {
          el.style.transform = 'translate(180vw, -10dvh) rotate(32deg)';
        } else {
          el.style.transform = 'translate(-180vw, -10dvh) rotate(-32deg)';
        }
        el.style.opacity = '0';
        
        const id = el.dataset.id;
        if (dir === 'right') {
          const c = cardById(id);
          if (c) {
            c.mastered = true;
            persist();
          }
          queue = queue.filter(q => q !== id);
        } else {
          queue = queue.filter(q => q !== id);
          queue.push(id);
        }

        updateProgress();

        const cardsInDom = Array.from(deckEl.querySelectorAll('.fcard'));
        const cardB = cardsInDom[cardsInDom.length - 2];
        const cardC = cardsInDom[cardsInDom.length - 3];

        if (cardB) {
          cardB.className = 'fcard absolute inset-0 rounded-[32px] z-20';
          cardB.style.transition = 'transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.35s';
          cardB.style.opacity = '';
          attachDrag(cardB);
        }
        
        if (cardC) {
          cardC.className = 'fcard absolute inset-0 rounded-[32px] behind';
          cardC.style.transition = 'transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.35s';
          cardC.style.opacity = '';
        }

        const nextSlice = queue.slice(0, 3);
        if (nextSlice.length >= 3) {
          const newCardId = nextSlice[2];
          const newCardData = cardById(newCardId);
          if (newCardData) {
            const newEl = buildCard(newCardData);
            newEl.className = 'fcard absolute inset-0 rounded-[32px] behind2';
            deckEl.insertBefore(newEl, deckEl.firstChild);
          }
        }

        setTimeout(() => {
          el.remove();
          animating = false;
          flipped = false;
          
          if (queue.length === 0 || state.cards.length === 0) {
            renderDeck(true);
          }
        }, 300);
      }

      function buttonSwipe(dir) {
        const el = deckEl.lastElementChild;
        if (!el || animating) return;
        el.style.transform = `translate(${dir === 'right' ? 30 : -30}px, -4px) rotate(${dir === 'right' ? 3 : -3}deg)`;
        requestAnimationFrame(() => fly(el, dir));
      }

      $('btnRight').addEventListener('click', () => buttonSwipe('right'));
      $('btnLeft').addEventListener('click', () => buttonSwipe('left'));
      $('btnFlip').addEventListener('click', () => flipCard());

      $('btnToggleExamples').addEventListener('click', () => {
        hideExamples = !hideExamples;
        deckEl.classList.toggle('hide-examples', hideExamples);
        
        const eyeIcon = $('eyeIcon');
        if (hideExamples) {
          eyeIcon.innerHTML = `
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22"></path>
          `;
          toast('Exemples masqués');
        } else {
          eyeIcon.innerHTML = `
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          `;
          toast('Exemples affichés');
        }
      });

      document.addEventListener('keydown', e => {
        if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;
        if (e.key === 'ArrowRight') buttonSwipe('right');
        if (e.key === 'ArrowLeft') buttonSwipe('left');
        if (e.key === ' ') {
          e.preventDefault();
          flipCard();
        }
      });

      const inFr = $('inFr'),
            inEn = $('inEn'),
            inDesc = $('inDesc'),
            btnAdd = $('btnAdd');

      function validate() {
        btnAdd.disabled = !(inFr.value.trim() && inEn.value.trim());
      }

      inFr.addEventListener('input', validate);
      inEn.addEventListener('input', validate);

      [inFr, inEn, inDesc].forEach(i => i.addEventListener('keydown', e => {
        if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA' && !btnAdd.disabled) addCard();
      }));

      btnAdd.addEventListener('click', addCard);

      function addCard() {
        const c = {
          id: uid(),
          fr: inFr.value.trim(),
          en: inEn.value.trim(),
          desc: inDesc.value.trim() || DEFAULT_DESC,
          mastered: false
        };
        state.cards.unshift(c);
        queue.unshift(c.id);
        persist();

        inFr.value = '';
        inEn.value = '';
        inDesc.value = '';
        validate();
        inFr.focus();

        updateProgress();

        if (deckEl.querySelector('.empty')) renderDeck(true);
        toast('Carte ajoutée !');
      }

      function switchTab(which) {
        const study = which === 'study';
        
        // Dynamic classes based on screen size to preserve optimal touch surfaces
        const activeClassMobile = 'px-6 py-2 md:px-5 md:py-1.5 text-xs font-semibold rounded-full transition-all bg-slate-800 text-white md:bg-white md:!text-slate-800 md:shadow-sm';
        const inactiveClassMobile = 'px-5 py-2 md:px-5 md:py-1.5 text-xs font-semibold rounded-full transition-all text-slate-500';
        
        $('tabStudy').className = study ? activeClassMobile : inactiveClassMobile;
        $('tabManage').className = !study ? activeClassMobile : inactiveClassMobile;
        
        $('btnToggleExamples').style.display = study ? 'flex' : 'none';
        $('navDivider').style.display = study ? 'block' : 'none';
        
        if (study) {
          $('viewStudy').classList.add('flex');
          $('viewStudy').classList.remove('hidden');
          $('viewManage').classList.add('hidden');
          $('viewManage').classList.remove('flex');
        } else {
          $('viewStudy').classList.remove('flex');
          $('viewStudy').classList.add('hidden');
          $('viewManage').classList.remove('hidden');
          $('viewManage').classList.add('flex');
        }
      }
      
      $('tabStudy').addEventListener('click', () => switchTab('study'));
      $('tabManage').addEventListener('click', () => switchTab('manage'));

      load().then(() => {
        rebuildQueue();
        renderDeck(true);
      });
    })();
  </script>
</body>
